name: Release

# Tag-triggered. Push a vX.Y.Z tag to build artifacts, create a GitHub Release,
# publish to PyPI (trusted publishing), and list on the MCP Registry — all via
# OIDC, no tokens stored in the repo. See RELEASING.md.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # create the GitHub Release
  id-token: write # PyPI trusted publishing (OIDC)

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Verify tag matches package version
        run: |
          PKG=$(python3 -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          TAG="${GITHUB_REF_NAME#v}"
          if [ "$PKG" != "$TAG" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match pyproject version $PKG" >&2
            exit 1
          fi
          echo "Releasing version $PKG"

      - name: Build sdist + wheel
        run: uv build

      - name: Create GitHub Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          files: |
            dist/*.whl
            dist/*.tar.gz
          generate_release_notes: true
          fail_on_unmatched_files: true

      # Requires a PyPI trusted publisher configured for this repo + workflow.
      # Until that's set up this step fails without affecting the GitHub Release above.
      - name: Publish to PyPI (trusted publishing)
        run: uv publish

  # Lists the server on the official MCP Registry (metadata only — points at the
  # PyPI package above). Separate job so it can be re-run without re-publishing
  # PyPI. Ownership is verified via the `mcp-name` marker in the PyPI README.
  publish-registry:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      id-token: write # MCP Registry GitHub OIDC auth
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Wait for PyPI to expose this version + mcp-name marker
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          NAME="io.github.SBolivarLoL/clover-mcp"
          for i in $(seq 1 18); do
            if curl -fsS "https://pypi.org/pypi/clover-mcp/${VERSION}/json" \
                 | grep -q "mcp-name: ${NAME}"; then
              echo "PyPI ${VERSION} is live with the mcp-name marker."; exit 0
            fi
            echo "waiting for PyPI propagation ($i)…"; sleep 10
          done
          echo "::error::PyPI ${VERSION} not visible with mcp-name after ~3min" >&2; exit 1

      - name: Install mcp-publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher

      - name: Sync server.json version to the tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          jq --arg v "$VERSION" '.version=$v | .packages[0].version=$v' server.json > server.tmp
          mv server.tmp server.json

      - name: Authenticate to MCP Registry (GitHub OIDC)
        run: ./mcp-publisher login github-oidc

      - name: Publish to MCP Registry
        run: ./mcp-publisher publish
