name: Release

# Tag-triggered. Push a vX.Y.Z tag to build artifacts and publish a GitHub Release.
# NOTE: this deliberately does NOT publish to PyPI — releases are GitHub-only for
# now. To enable PyPI later, add a `uv publish` step after the build (ideally with
# a trusted-publisher / OIDC config). See RELEASING.md.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # required to create the GitHub Release

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Verify tag matches package version
        run: |
          PKG=$(python3 -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          TAG="${GITHUB_REF_NAME#v}"
          if [ "$PKG" != "$TAG" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match pyproject version $PKG" >&2
            exit 1
          fi
          echo "Releasing version $PKG"

      - name: Build sdist + wheel
        run: uv build

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          fail_on_unmatched_files: true
